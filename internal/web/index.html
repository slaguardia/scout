<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>scout — triage</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    --bg: #0f1115;
    --panel: #161922;
    --panel2: #1a1e2a;
    --fg: #e6e8ee;
    --mute: #7a8194;
    --line: #232838;
    --yes: #2ec27e;
    --maybe: #e5a50a;
    --no: #d44b4b;
    --link: #6aa9ff;
    --pane-w: 540px;
    --sidebar-w: 260px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 14px/1.45 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
  }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    padding: 12px 20px; border-bottom: 1px solid var(--line);
    display: flex; gap: 12px; align-items: center;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; letter-spacing: 0.02em; }
  header .stats { color: var(--mute); }

  .layout { display: grid; grid-template-columns: var(--sidebar-w) 1fr; min-height: calc(100vh - 49px); }

  aside.sidebar {
    border-right: 1px solid var(--line); background: var(--bg);
    padding: 16px 16px 32px; overflow-y: auto;
    position: sticky; top: 0;
    max-height: 100vh;
  }
  aside.sidebar h3 {
    margin: 0 0 8px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--mute);
  }
  aside.sidebar .block { margin-bottom: 22px; }
  aside.sidebar input, aside.sidebar select {
    background: var(--panel); color: var(--fg);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 10px; font: inherit; width: 100%;
  }
  aside.sidebar .filter-row { margin-bottom: 8px; }
  aside.sidebar .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 2px 0; font-size: 13px;
  }
  aside.sidebar .stat-row .k { color: var(--mute); }
  aside.sidebar .stat-row .v { font-variant-numeric: tabular-nums; }
  aside.sidebar .stale {
    margin-top: 6px; padding: 6px 8px;
    background: rgba(229,165,10,0.08); color: var(--maybe);
    border-radius: 4px; font-size: 12px;
  }
  aside.sidebar code { color: var(--fg); }

  main { padding: 12px 20px 40px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left; padding: 8px 10px; font-weight: 600;
    color: var(--mute); border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  tbody td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; }
  tbody tr:hover { background: var(--panel2); }

  .pill {
    display: inline-block; padding: 1px 8px; border-radius: 999px;
    font-size: 12px; font-weight: 600; text-transform: lowercase;
  }
  .pill-yes   { background: rgba(46,194,126,0.15); color: var(--yes); }
  .pill-maybe { background: rgba(229,165,10,0.15); color: var(--maybe); }
  .pill-no    { background: rgba(212,75,75,0.15);  color: var(--no); }
  .pill-none  { background: #2a2f3d; color: var(--mute); }
  .pill-status { font-size: 11px; }
  .pill-status-new       { background: #2a2f3d; color: var(--mute); }
  .pill-status-reviewed  { background: rgba(106,169,255,0.15); color: var(--link); }
  .pill-status-tracked   { background: rgba(46,194,126,0.15);  color: var(--yes); }
  .pill-status-dismissed { background: #1d2029; color: var(--mute); }

  tr.row-tracked > td:first-child { border-left: 3px solid var(--yes); padding-left: 7px; }
  tr.row-dismissed { opacity: 0.45; }
  .reason { color: var(--mute); }
  .empty { padding: 60px 0; text-align: center; color: var(--mute); }

  .row-name { cursor: pointer; }
  .row-name:hover { color: var(--link); }

  /* ---- detail pane ---- */
  .scrim {
    position: fixed; inset: 0; background: rgba(0,0,0,0.55);
    opacity: 0; pointer-events: none; transition: opacity 120ms ease;
    z-index: 50;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .pane {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--pane-w); max-width: 92vw;
    background: var(--panel); color: var(--fg);
    border-left: 1px solid var(--line);
    box-shadow: -16px 0 32px rgba(0,0,0,0.4);
    transform: translateX(100%);
    transition: transform 180ms ease;
    z-index: 51;
    display: flex; flex-direction: column;
  }
  .pane.open { transform: translateX(0); }

  .pane-head {
    padding: 16px 20px; border-bottom: 1px solid var(--line);
    display: flex; gap: 10px; align-items: center;
  }
  .pane-head h2 { margin: 0; font-size: 17px; font-weight: 600; flex: 1; }
  .pane-head .close-btn {
    background: none; border: none; color: var(--mute);
    cursor: pointer; font-size: 22px; line-height: 1; padding: 0 6px;
  }
  .pane-head .close-btn:hover { color: var(--fg); }

  .pane-body { overflow-y: auto; padding: 16px 20px 32px; flex: 1; }
  .pane-section { margin-bottom: 22px; }
  .pane-section h3 {
    margin: 0 0 8px; font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.08em; color: var(--mute);
  }

  .kv { display: grid; grid-template-columns: 110px 1fr; gap: 4px 14px; }
  .kv dt { color: var(--mute); font-weight: 500; }
  .kv dd { margin: 0; }

  .pills-inline { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  .status-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-btn {
    background: var(--panel2); color: var(--fg);
    border: 1px solid var(--line); border-radius: 6px;
    padding: 6px 12px; font: inherit; cursor: pointer;
  }
  .status-btn:hover:not(:disabled) { border-color: var(--mute); }
  .status-btn.active { border-color: var(--link); color: var(--link); }
  .status-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .summary-box {
    padding: 12px 14px; background: #121622; color: var(--mute);
    border-left: 3px solid var(--line); border-radius: 4px;
    white-space: pre-wrap; max-height: 360px; overflow-y: auto;
    font-size: 13px; line-height: 1.5;
  }

  details.raw-json { margin-top: 8px; }
  details.raw-json summary {
    cursor: pointer; color: var(--mute); font-size: 12px;
    padding: 4px 0; user-select: none;
  }
  details.raw-json summary:hover { color: var(--fg); }
  details.raw-json table { font-size: 12px; margin-top: 6px; }
  details.raw-json td { padding: 3px 8px 3px 0; border: none; vertical-align: top; }
  details.raw-json td.k { color: var(--mute); white-space: nowrap; }

  .brain-node {
    padding: 10px 12px; background: #121622; border-radius: 4px;
    margin-bottom: 8px; border-left: 3px solid var(--link);
  }
  .brain-node .n { font-weight: 600; }
  .brain-node .l { color: var(--mute); font-size: 12px; }
  .brain-node .s { color: var(--mute); margin-top: 4px; }

  .muted { color: var(--mute); }
  .small { font-size: 12px; }
  .tooltip { cursor: help; border-bottom: 1px dotted var(--mute); }

  .toast {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: var(--panel); border: 1px solid var(--line); color: var(--fg);
    padding: 10px 16px; border-radius: 6px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity 160ms ease;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<header>
  <h1>scout / triage</h1>
  <span class="stats" id="stats">loading…</span>
</header>

<div class="layout">
<aside class="sidebar">
  <div class="block">
    <h3>Filter</h3>
    <div class="filter-row"><input id="q" placeholder="search name / vertical / reason"></div>
    <div class="filter-row">
      <select id="verdict">
        <option value="">verdict: any</option>
        <option value="yes">yes</option>
        <option value="maybe">maybe</option>
        <option value="no">no</option>
        <option value="__none__">(unscored)</option>
      </select>
    </div>
    <div class="filter-row">
      <select id="state">
        <option value="">status: any</option>
        <option value="new">new</option>
        <option value="reviewed">reviewed</option>
        <option value="tracked">tracked</option>
        <option value="dismissed">dismissed</option>
      </select>
    </div>
  </div>

  <div class="block" id="block-pipeline">
    <h3>Pipeline</h3>
    <div id="pipeline-stats"><div class="muted small">loading…</div></div>
  </div>

  <div class="block" id="block-verdicts">
    <h3>By verdict</h3>
    <div id="verdict-stats"></div>
  </div>

  <div class="block" id="block-status">
    <h3>By status</h3>
    <div id="status-stats"></div>
  </div>

  <div class="block" id="block-fetch" style="display:none">
    <h3>Enrichment failures</h3>
    <div id="fetch-stats"></div>
  </div>

  <div class="block" id="block-taste">
    <h3>Current taste</h3>
    <div id="taste-stats"><div class="muted small">loading…</div></div>
  </div>
</aside>

<main>
  <table id="t">
    <thead>
      <tr>
        <th data-k="verdict">verdict</th>
        <th data-k="state">status</th>
        <th data-k="name">name</th>
        <th data-k="reason">reason</th>
        <th data-k="vertical">vertical</th>
        <th data-k="location">location</th>
        <th data-k="headcount">hc</th>
        <th data-k="stage">stage</th>
        <th>site</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
  <div id="empty" class="empty" style="display:none">No companies match the current filters.</div>
</main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="pane" id="pane" aria-hidden="true">
  <div class="pane-head">
    <h2 id="pane-title">—</h2>
    <span id="pane-pills" class="pills-inline"></span>
    <button class="close-btn" id="pane-close" aria-label="close">×</button>
  </div>
  <div class="pane-body" id="pane-body">loading…</div>
</aside>

<div class="toast" id="toast"></div>

<script>
const state = { rows: [], sort: { k: "verdict", dir: 1 }, openId: null, stats: null };

const pillClass = v => "pill pill-" + (v || "none");
const escapeHTML = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function loadList() {
  const r = await fetch("/api/companies");
  const data = await r.json();
  state.rows = data.rows || [];
  document.getElementById("stats").textContent =
    state.rows.length + " companies · "
    + countBy(state.rows, "verdict").map(([k,v]) => (k||"unscored") + "=" + v).join(" · ");
  renderList();
}

async function loadStats() {
  let s;
  try {
    const r = await fetch("/api/stats");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    s = await r.json();
  } catch (e) {
    document.getElementById("pipeline-stats").innerHTML =
      `<div class="muted small">stats failed: ${escapeHTML(e.message)}</div>`;
    return;
  }
  state.stats = s;
  renderStats();
}

function statLine(k, v) {
  return `<div class="stat-row"><span class="k">${escapeHTML(k)}</span><span class="v">${v}</span></div>`;
}

function renderStats() {
  const s = state.stats || {};
  // Survivors = rows matching the current filter view.
  const survivors = filtered().length;
  document.getElementById("pipeline-stats").innerHTML =
    statLine("total", s.total_companies ?? 0) +
    statLine("survivors (filter)", survivors) +
    statLine("enriched ok", s.enriched_ok ?? 0) +
    statLine("scored", s.scored ?? 0) +
    statLine("unscored", s.unscored ?? 0);

  const v = s.by_verdict || {};
  document.getElementById("verdict-stats").innerHTML =
    ["yes","maybe","no"].map(k => statLine(k, v[k] || 0)).join("") +
    statLine("unscored", s.unscored ?? 0);

  const st = s.by_status || {};
  document.getElementById("status-stats").innerHTML =
    ["new","reviewed","tracked","dismissed"].map(k => statLine(k, st[k] || 0)).join("");

  // Fetch failures: show only non-ok statuses.
  const fs = s.fetch_status || {};
  const failures = Object.keys(fs).filter(k => k !== "ok").sort();
  if (failures.length === 0) {
    document.getElementById("block-fetch").style.display = "none";
  } else {
    document.getElementById("block-fetch").style.display = "";
    document.getElementById("fetch-stats").innerHTML =
      failures.map(k => statLine(k, fs[k])).join("");
  }

  // Taste
  const tasteHTML = s.current_taste
    ? `<div class="small">source: <code>${escapeHTML(s.taste_source || "")}</code></div>
       <div class="small" style="margin-top:4px">version: <code>${escapeHTML(s.current_taste)}</code></div>
       ${s.stale_verdicts > 0 ? `<div class="stale">${s.stale_verdicts} verdicts stale</div>` : ""}`
    : `<div class="muted small">no taste loaded — start <code>scout serve --taste-md taste.md</code></div>`;
  document.getElementById("taste-stats").innerHTML = tasteHTML;
}

function countBy(rows, key) {
  const m = new Map();
  for (const r of rows) m.set(r[key] || "", (m.get(r[key]||"") || 0) + 1);
  return Array.from(m.entries()).sort((a,b) => b[1] - a[1]);
}

function compare(a, b, k) {
  const av = a[k] ?? ""; const bv = b[k] ?? "";
  if (k === "headcount") return (av|0) - (bv|0);
  if (k === "verdict") {
    const order = { yes: 0, maybe: 1, no: 2, "": 3 };
    return (order[av] ?? 3) - (order[bv] ?? 3);
  }
  if (k === "state") {
    const order = { tracked: 0, new: 1, reviewed: 2, dismissed: 3, "": 1 };
    return (order[av] ?? 1) - (order[bv] ?? 1);
  }
  return String(av).localeCompare(String(bv));
}

// Sort comparator that pushes dismissed rows to the bottom of their
// verdict bucket regardless of the active sort key.
function sortWithDismissedLast(rows) {
  return rows.slice().sort((a, b) => {
    const av = state.sort.dir * compare(a, b, state.sort.k);
    // Dismissed goes last within whatever group the active sort puts them in.
    const ad = (a.state === "dismissed") ? 1 : 0;
    const bd = (b.state === "dismissed") ? 1 : 0;
    if (ad !== bd) return ad - bd;
    return av;
  });
}

function filtered() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const v = document.getElementById("verdict").value;
  const s = document.getElementById("state").value;
  return state.rows.filter(r => {
    if (v === "__none__" && r.verdict) return false;
    if (v && v !== "__none__" && r.verdict !== v) return false;
    if (s && r.state !== s) return false;
    if (q) {
      const hay = (r.name + " " + (r.vertical||"") + " " + (r.reason||"")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderList() {
  const tbody = document.querySelector("#t tbody");
  tbody.innerHTML = "";
  const rows = sortWithDismissedLast(filtered());
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  // Sidebar "survivors (filter)" updates with the current filter.
  if (state.stats) {
    const sr = document.querySelector("#pipeline-stats .stat-row:nth-child(2) .v");
    if (sr) sr.textContent = rows.length;
  }
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.dataset.id = r.company_id;
    if (r.state === "tracked") tr.classList.add("row-tracked");
    if (r.state === "dismissed") tr.classList.add("row-dismissed");
    tr.innerHTML = `
      <td><span class="${pillClass(r.verdict)}">${escapeHTML(r.verdict || "—")}</span></td>
      <td><span class="pill pill-status pill-status-${escapeHTML(r.state || "new")}">${escapeHTML(r.state || "new")}</span></td>
      <td><span class="row-name" data-id="${r.company_id}">${escapeHTML(r.name)}</span></td>
      <td class="reason">${escapeHTML(r.reason || "")}</td>
      <td>${escapeHTML(r.vertical || "")}</td>
      <td>${escapeHTML(r.location || "")}</td>
      <td>${r.headcount || ""}</td>
      <td>${escapeHTML(r.stage || "")}</td>
      <td>${r.website_url ? `<a href="${escapeHTML(r.website_url)}" target="_blank" rel="noopener">about</a>` : ""}</td>
    `;
    tbody.appendChild(tr);
  }
  tbody.querySelectorAll(".row-name").forEach(el => {
    el.addEventListener("click", () => openDetail(parseInt(el.dataset.id, 10)));
  });
}

// Update a single in-memory row + its rendered <tr> after status change.
function updateRowState(id, newState) {
  const row = state.rows.find(r => r.company_id === id);
  if (row) row.state = newState;
  // Re-render the whole list so the dismissed-last sort stays accurate.
  renderList();
}

// ---- detail pane ----
async function openDetail(id) {
  state.openId = id;
  const pane = document.getElementById("pane");
  const scrim = document.getElementById("scrim");
  pane.classList.add("open"); scrim.classList.add("open");
  pane.setAttribute("aria-hidden", "false");
  document.getElementById("pane-title").textContent = "loading…";
  document.getElementById("pane-pills").innerHTML = "";
  document.getElementById("pane-body").innerHTML = '<div class="muted">loading…</div>';

  let d;
  try {
    const r = await fetch(`/api/companies/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    d = await r.json();
  } catch (e) {
    document.getElementById("pane-body").innerHTML =
      `<div class="muted">Failed to load detail: ${escapeHTML(e.message)}</div>`;
    return;
  }
  renderDetail(d);
  // Lazy-load brain context (no-op when --brainbot not set: 404).
  loadBrain(id);
}

function closeDetail() {
  state.openId = null;
  document.getElementById("pane").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("pane").setAttribute("aria-hidden", "true");
}

function renderDetail(d) {
  document.getElementById("pane-title").textContent = d.name;
  document.getElementById("pane-pills").innerHTML = `
    <span class="${pillClass(d.has_verdict ? d.verdict : "")}">${escapeHTML(d.has_verdict ? d.verdict : "unscored")}</span>
    <span class="pill pill-none">${escapeHTML(d.state || "new")}</span>
  `;

  // Domain link (when present)
  const domainLine = d.domain
    ? `<a href="https://${escapeHTML(d.domain)}" target="_blank" rel="noopener">${escapeHTML(d.domain)}</a>`
    : '<span class="muted">no domain</span>';

  // Verdict tooltip = first 200 chars of taste; we don't have the taste here,
  // so the version itself is the tooltip target — clicking will be unhelpful,
  // hover shows scored_at / model. (Full taste lookup is a v3 nice-to-have.)
  const verdictBlock = d.has_verdict ? `
    <dl class="kv">
      <dt>verdict</dt><dd><span class="${pillClass(d.verdict)}">${escapeHTML(d.verdict)}</span></dd>
      <dt>reason</dt><dd>${escapeHTML(d.reason || "")}</dd>
      <dt>model</dt><dd class="small muted">${escapeHTML(d.model || "")}</dd>
      <dt>taste version</dt><dd class="small muted"><span class="tooltip" title="scored ${escapeHTML(d.scored_at)} · model ${escapeHTML(d.model)}">${escapeHTML(d.taste_version || "")}</span></dd>
      <dt>scored at</dt><dd class="small muted">${escapeHTML(d.scored_at || "")}</dd>
    </dl>
  ` : '<div class="muted">Not yet scored. Run <code>scout verdict</code>.</div>';

  // Enrichment block
  const enrichBlock = d.has_enrichment ? `
    <dl class="kv">
      <dt>url</dt><dd>${d.website_url ? `<a href="${escapeHTML(d.website_url)}" target="_blank" rel="noopener">${escapeHTML(d.website_url)}</a>` : '<span class="muted">—</span>'}</dd>
      <dt>status</dt><dd class="small">${escapeHTML(d.fetch_status || "")}${d.fetch_error ? ` <span class="muted">(${escapeHTML(d.fetch_error)})</span>` : ""}</dd>
      <dt>fetched</dt><dd class="small muted">${escapeHTML(d.fetched_at || "")}</dd>
    </dl>
    ${d.website_summary ? `<div class="summary-box" style="margin-top:10px">${escapeHTML(d.website_summary)}</div>` : ""}
  ` : '<div class="muted">No enrichment yet. Run <code>scout enrich</code>.</div>';

  // Episode history
  const epBlock = d.episode_sent
    ? `<div class="small">Shipped to brain on <strong>${escapeHTML((d.episode_sent_at || "").slice(0,10))}</strong> for taste_version <code>${escapeHTML(d.taste_version)}</code>.</div>`
    : (d.has_verdict
        ? '<div class="muted">Not yet shipped to brain. Run <code>scout episodes</code>.</div>'
        : '<div class="muted">No verdict to ship.</div>');

  // Raw row disclosure
  const rawRows = Object.keys(d.raw_json || {}).sort();
  const rawHTML = rawRows.length === 0 ? '' : `
    <details class="raw-json">
      <summary>Raw row (${rawRows.length} fields)</summary>
      <table><tbody>
        ${rawRows.map(k => `<tr><td class="k">${escapeHTML(k)}</td><td>${escapeHTML(d.raw_json[k])}</td></tr>`).join("")}
      </tbody></table>
    </details>
  `;

  // After the body renders, wire status buttons.
  document.getElementById("pane-body").innerHTML = `
    <section class="pane-section">
      <h3>Status</h3>
      <div class="status-btns" id="status-btns">
        ${["reviewed","tracked","dismissed"].map(s =>
          `<button class="status-btn${d.state === s ? " active" : ""}" data-state="${s}">Mark ${s}</button>`
        ).join("")}
      </div>
      <div class="small muted" style="margin-top:8px">
        ${d.state === "tracked"
          ? `Promote command ready — click <em>Mark tracked</em> again to re-copy.`
          : `<em>Mark tracked</em> also copies <code>tracker.py add</code> to the clipboard.`}
      </div>
    </section>

    <section class="pane-section">
      <h3>Crunchbase facts</h3>
      <dl class="kv">
        <dt>vertical</dt><dd>${escapeHTML(d.vertical || "—")}</dd>
        <dt>location</dt><dd>${escapeHTML(d.location || "—")}</dd>
        <dt>headcount</dt><dd>${d.headcount || "—"}</dd>
        <dt>stage</dt><dd>${escapeHTML(d.funding_stage || "—")}</dd>
        <dt>domain</dt><dd>${domainLine}</dd>
        <dt>source</dt><dd class="small muted">${escapeHTML(d.source)} · ${escapeHTML(d.source_id)}</dd>
        <dt>ingested</dt><dd class="small muted">${escapeHTML(d.ingested_at)}</dd>
      </dl>
      ${rawHTML}
    </section>

    <section class="pane-section">
      <h3>Verdict</h3>
      ${verdictBlock}
    </section>

    <section class="pane-section">
      <h3>Enrichment</h3>
      ${enrichBlock}
    </section>

    <section class="pane-section" id="brain-section" style="display:none">
      <h3>Brain context</h3>
      <div id="brain-body"><div class="muted">loading…</div></div>
    </section>

    <section class="pane-section">
      <h3>Episode history</h3>
      ${epBlock}
    </section>
  `;

  // Wire status buttons.
  document.querySelectorAll("#status-btns .status-btn").forEach(btn => {
    btn.addEventListener("click", () => onStatusClick(d, btn.dataset.state));
  });
}

async function onStatusClick(d, newState) {
  // Disable buttons during the request to prevent double-fires.
  const btns = document.querySelectorAll("#status-btns .status-btn");
  btns.forEach(b => b.disabled = true);
  let resp;
  try {
    resp = await fetch(`/api/companies/${d.company_id}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: newState }),
    });
  } catch (e) {
    toast(`status update failed: ${e.message}`);
    btns.forEach(b => b.disabled = false);
    return;
  }
  if (!resp.ok) {
    const txt = await resp.text().catch(() => "");
    toast(`status update failed: HTTP ${resp.status}${txt ? " — " + txt : ""}`);
    btns.forEach(b => b.disabled = false);
    return;
  }

  // Update local state.
  d.state = newState;
  updateRowState(d.company_id, newState);

  // Reflect active button.
  btns.forEach(b => {
    b.classList.toggle("active", b.dataset.state === newState);
    b.disabled = false;
  });

  // Update the header pill.
  const pills = document.getElementById("pane-pills");
  pills.innerHTML = `
    <span class="${pillClass(d.has_verdict ? d.verdict : "")}">${escapeHTML(d.has_verdict ? d.verdict : "unscored")}</span>
    <span class="pill pill-none">${escapeHTML(d.state)}</span>
  `;

  if (newState === "tracked") {
    const cmd = `tracker.py add "${d.name}"`;
    try {
      await navigator.clipboard.writeText(cmd);
      toast(`copied: ${cmd}`);
    } catch {
      // Fallback when clipboard API is blocked (e.g. HTTP, no user gesture).
      toast(`tracked — copy manually: ${cmd}`);
    }
  } else {
    toast(`marked ${newState}`);
  }
}

async function loadBrain(id) {
  let r;
  try {
    r = await fetch(`/api/companies/${id}/brain`);
  } catch {
    return; // network — hide section
  }
  if (r.status === 404) return; // brainbot not configured — section stays hidden
  if (!r.ok) {
    showBrain(`<div class="muted">Brain lookup failed: HTTP ${r.status}.</div>`);
    return;
  }
  const data = await r.json();
  if (data.error) {
    showBrain(`<div class="muted">Brain lookup error: ${escapeHTML(data.error)}.</div>`);
    return;
  }
  const nodes = data.nodes || [];
  if (nodes.length === 0) {
    showBrain('<div class="muted">Nothing in the brain about this company.</div>');
    return;
  }
  showBrain(nodes.map(n => `
    <div class="brain-node">
      <div class="n">${escapeHTML(n.name)}${n.labels && n.labels.length ? ` <span class="l">${escapeHTML(n.labels.join(" · "))}</span>` : ""}</div>
      ${n.summary ? `<div class="s">${escapeHTML(n.summary)}</div>` : ""}
    </div>
  `).join(""));
}

function showBrain(html) {
  const sec = document.getElementById("brain-section");
  if (!sec) return;
  sec.style.display = "";
  document.getElementById("brain-body").innerHTML = html;
}

// ---- toast (placeholder; used by U3) ----
let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2000);
}

// ---- wiring ----
document.querySelectorAll("#t thead th[data-k]").forEach(th => {
  th.onclick = () => {
    const k = th.dataset.k;
    if (state.sort.k === k) state.sort.dir *= -1; else { state.sort.k = k; state.sort.dir = 1; }
    renderList();
  };
});
document.getElementById("q").oninput = renderList;
document.getElementById("verdict").onchange = renderList;
document.getElementById("state").onchange = renderList;
document.getElementById("pane-close").onclick = closeDetail;
document.getElementById("scrim").onclick = closeDetail;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

loadList();
loadStats();

// When a status changes via the detail pane, refresh stats so by_status updates.
const origUpdateRowState = updateRowState;
updateRowState = function(id, newState) {
  origUpdateRowState(id, newState);
  loadStats();
};
</script>
