<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>scout — triage</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
  :root {
    /* surface */
    --bg:       #0b0d12;
    --bg-2:     #0f1218;
    --panel:    #14171f;
    --panel-2:  #181c26;
    --panel-3:  #1d2230;

    /* foreground */
    --fg:       #e8eaf0;
    --fg-mute:  #9099a8;
    --fg-dim:   #6c7484;

    /* lines */
    --line:     #232838;
    --line-2:   #2d3243;

    /* accents */
    --yes:      #34d399;
    --yes-bg:   rgba(52, 211, 153, 0.12);
    --maybe:    #f5b942;
    --maybe-bg: rgba(245, 185, 66, 0.12);
    --no:       #ef6464;
    --no-bg:    rgba(239, 100, 100, 0.12);
    --link:     #7aa9ff;
    --link-bg:  rgba(122, 169, 255, 0.12);
    --accent:   #8b6dff;

    /* shape */
    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
    --r-xl: 14px;

    /* motion */
    --ease: cubic-bezier(0.32, 0.72, 0, 1);
    --dur-fast: 120ms;
    --dur-base: 180ms;
    --dur-slow: 260ms;

    /* shadow */
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.25);
    --shadow-md: 0 8px 24px rgba(0,0,0,0.35);
    --shadow-lg: -16px 0 48px rgba(0,0,0,0.55);

    /* layout */
    --pane-w:    560px;
    --sidebar-w: 280px;
    --header-h:  56px;
  }

  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font: 14px/1.5 -apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, "Segoe UI", Roboto, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    font-feature-settings: "ss01", "cv11";
  }
  code, .mono { font: 12.5px/1.4 "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }

  a { color: var(--link); text-decoration: none; }
  a:hover { color: #a4c2ff; text-decoration: underline; text-underline-offset: 2px; }

  ::selection { background: rgba(139, 109, 255, 0.35); }

  /* ---- header ---- */
  header {
    height: var(--header-h);
    padding: 0 20px;
    border-bottom: 1px solid var(--line);
    display: flex; align-items: center; gap: 14px;
    background: linear-gradient(180deg, var(--bg-2), var(--bg));
    position: sticky; top: 0; z-index: 10;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 14.5px; font-weight: 600; letter-spacing: -0.01em;
  }
  .brand-dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--link));
    box-shadow: 0 0 12px rgba(139, 109, 255, 0.6);
  }
  .brand-slash { color: var(--fg-dim); font-weight: 400; }
  .brand-sub  { color: var(--fg-mute); font-weight: 500; }
  header .stats {
    color: var(--fg-mute); font-size: 13px;
    font-variant-numeric: tabular-nums;
  }
  header .spacer { flex: 1; }
  header .hint {
    color: var(--fg-dim); font-size: 12px;
  }
  header .hint kbd {
    display: inline-block; padding: 1px 6px; border-radius: 4px;
    background: var(--panel-2); border: 1px solid var(--line);
    font: 11px/1 "SF Mono", monospace; color: var(--fg-mute);
  }

  /* ---- layout ---- */
  .layout {
    display: grid;
    grid-template-columns: var(--sidebar-w) 1fr;
    min-height: calc(100vh - var(--header-h));
  }

  /* ---- sidebar ---- */
  aside.sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-2);
    padding: 18px 16px 40px;
    overflow-y: auto;
    position: sticky; top: var(--header-h);
    max-height: calc(100vh - var(--header-h));
  }
  aside.sidebar .block { margin-bottom: 24px; }
  aside.sidebar .block:last-child { margin-bottom: 0; }
  aside.sidebar h3 {
    margin: 0 0 10px;
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--fg-dim);
    display: flex; align-items: center; gap: 6px;
  }
  aside.sidebar h3 svg { width: 12px; height: 12px; opacity: 0.9; }

  /* filter inputs */
  .filter-row { margin-bottom: 8px; }
  .filter-row:last-child { margin-bottom: 0; }
  .input, aside.sidebar input, aside.sidebar select {
    width: 100%;
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 7px 10px;
    font: inherit;
    outline: none;
    transition: border-color var(--dur-fast) var(--ease),
                box-shadow var(--dur-fast) var(--ease),
                background var(--dur-fast) var(--ease);
  }
  .input:hover, aside.sidebar input:hover, aside.sidebar select:hover {
    border-color: var(--line-2);
  }
  .input:focus, aside.sidebar input:focus, aside.sidebar select:focus {
    border-color: var(--link);
    box-shadow: 0 0 0 3px rgba(122, 169, 255, 0.15);
    background: var(--panel-2);
  }
  aside.sidebar select {
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%239099a8' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 10px center;
    padding-right: 28px;
  }

  /* search input gets an icon */
  .search-wrap { position: relative; }
  .search-wrap input { padding-left: 30px; }
  .search-wrap svg {
    position: absolute; left: 10px; top: 50%; transform: translateY(-50%);
    width: 13px; height: 13px; color: var(--fg-dim); pointer-events: none;
  }

  /* stat rows in sidebar */
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 4px 0;
    font-size: 13px;
    border-bottom: 1px solid transparent;
  }
  .stat-row .k { color: var(--fg-mute); }
  .stat-row .v {
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    font-weight: 600;
  }
  .stat-row .v.zero { color: var(--fg-dim); font-weight: 400; }

  .pipeline-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 6px 12px;
    padding-top: 2px;
  }
  .pipeline-grid .pcard {
    padding: 8px 10px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
  }
  .pipeline-grid .pnum {
    font-size: 18px; font-weight: 600;
    font-variant-numeric: tabular-nums;
    color: var(--fg);
    line-height: 1.1;
  }
  .pipeline-grid .pnum.zero { color: var(--fg-dim); }
  .pipeline-grid .plabel {
    font-size: 10.5px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 4px;
  }

  .stale {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--maybe-bg);
    color: var(--maybe);
    border-radius: var(--r-md);
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .stale svg { width: 13px; height: 13px; flex: none; }

  aside.sidebar code {
    color: var(--fg);
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--r-sm);
    padding: 1px 5px;
  }

  /* ---- main / table ---- */
  main { padding: 16px 24px 60px; min-width: 0; }

  .table-wrap {
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    background: var(--bg-2);
    overflow: hidden;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 11px 14px;
    font-weight: 500;
    font-size: 11.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--fg-dim);
    border-bottom: 1px solid var(--line);
    cursor: pointer; user-select: none; white-space: nowrap;
    background: var(--bg-2);
    transition: color var(--dur-fast) var(--ease);
  }
  thead th:hover { color: var(--fg-mute); }

  tbody td {
    padding: 11px 14px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
    font-size: 13.5px;
  }
  tbody tr {
    transition: background var(--dur-fast) var(--ease);
  }
  tbody tr:last-child td { border-bottom: none; }
  tbody tr:hover { background: var(--panel); }

  /* ---- pills ---- */
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    text-transform: lowercase;
    letter-spacing: 0.01em;
    line-height: 1.5;
  }
  .pill::before {
    content: "";
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.85;
  }
  .pill-yes   { background: var(--yes-bg);   color: var(--yes); }
  .pill-maybe { background: var(--maybe-bg); color: var(--maybe); }
  .pill-no    { background: var(--no-bg);    color: var(--no); }
  .pill-none  { background: var(--panel-3);  color: var(--fg-dim); }
  .pill-none::before { opacity: 0.5; }

  .pill-status { font-size: 10.5px; padding: 1px 8px; }
  .pill-status-new       { background: var(--panel-3); color: var(--fg-mute); }
  .pill-status-reviewed  { background: var(--link-bg); color: var(--link); }
  .pill-status-tracked   { background: var(--yes-bg);  color: var(--yes); }
  .pill-status-dismissed { background: #1a1d27;        color: var(--fg-dim); }

  /* row visual treatments */
  tr.row-tracked > td:first-child {
    box-shadow: inset 3px 0 0 var(--yes);
  }
  tr.row-dismissed { opacity: 0.45; }
  tr.row-dismissed:hover { opacity: 0.7; }

  .reason { color: var(--fg-mute); }
  td .row-name {
    cursor: pointer; font-weight: 500;
    transition: color var(--dur-fast) var(--ease);
  }
  td .row-name:hover { color: var(--link); }

  /* ---- empty state ---- */
  .empty {
    padding: 80px 20px;
    text-align: center;
    color: var(--fg-dim);
  }
  .empty svg {
    width: 36px; height: 36px;
    margin-bottom: 12px;
    opacity: 0.5;
  }
  .empty .t { font-size: 14px; color: var(--fg-mute); margin-bottom: 4px; }

  /* ---- spinner ---- */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid var(--line-2);
    border-top-color: var(--link);
    border-radius: 50%;
    animation: spin 800ms linear infinite;
    vertical-align: -3px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-row {
    display: inline-flex; align-items: center; gap: 8px;
    color: var(--fg-dim); font-size: 13px;
  }

  /* ---- detail pane ---- */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(5, 7, 10, 0.6);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    opacity: 0; pointer-events: none;
    transition: opacity var(--dur-base) var(--ease);
    z-index: 50;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }

  .pane {
    position: fixed; top: 0; right: 0; bottom: 0;
    width: var(--pane-w); max-width: 94vw;
    background: var(--bg-2);
    color: var(--fg);
    border-left: 1px solid var(--line);
    box-shadow: var(--shadow-lg);
    transform: translateX(100%);
    transition: transform var(--dur-slow) var(--ease);
    z-index: 51;
    display: flex; flex-direction: column;
  }
  .pane.open { transform: translateX(0); }

  .pane-head {
    padding: 18px 22px 14px;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 12px; align-items: center;
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
  }
  .pane-head h2 {
    margin: 0;
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.01em;
    flex: 1;
    min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .pane-head .close-btn {
    background: transparent;
    border: 1px solid transparent;
    color: var(--fg-mute);
    cursor: pointer;
    width: 30px; height: 30px;
    border-radius: var(--r-md);
    display: flex; align-items: center; justify-content: center;
    transition: all var(--dur-fast) var(--ease);
  }
  .pane-head .close-btn:hover {
    color: var(--fg);
    background: var(--panel-2);
    border-color: var(--line);
  }
  .pane-head .close-btn svg { width: 14px; height: 14px; }

  .pane-body {
    overflow-y: auto;
    padding: 22px 22px 40px;
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: var(--line-2) transparent;
  }
  .pane-body::-webkit-scrollbar { width: 10px; }
  .pane-body::-webkit-scrollbar-thumb {
    background: var(--line-2); border-radius: 999px;
    border: 2px solid var(--bg-2);
  }

  .pane-section { margin-bottom: 26px; }
  .pane-section:last-child { margin-bottom: 0; }
  .pane-section h3 {
    margin: 0 0 10px;
    font-size: 10.5px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--fg-dim);
    display: flex; align-items: center; gap: 6px;
  }
  .pane-section h3 svg { width: 12px; height: 12px; opacity: 0.85; }

  /* kv grid */
  .kv {
    display: grid; grid-template-columns: 112px 1fr;
    gap: 6px 16px;
    font-size: 13.5px;
  }
  .kv dt { color: var(--fg-mute); font-weight: 500; }
  .kv dd { margin: 0; word-wrap: break-word; min-width: 0; }

  .pills-inline { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

  /* status buttons */
  .status-btns { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-btn {
    background: var(--panel);
    color: var(--fg);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 7px 13px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all var(--dur-fast) var(--ease);
  }
  .status-btn:hover:not(:disabled) {
    border-color: var(--line-2);
    background: var(--panel-2);
  }
  .status-btn.active {
    border-color: var(--link);
    color: var(--link);
    background: var(--link-bg);
  }
  .status-btn[data-state="tracked"].active {
    border-color: var(--yes); color: var(--yes); background: var(--yes-bg);
  }
  .status-btn[data-state="dismissed"].active {
    border-color: var(--fg-dim); color: var(--fg-mute); background: var(--panel-3);
  }
  .status-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .status-btn svg { width: 12px; height: 12px; }

  /* summary box */
  .summary-box {
    margin-top: 12px;
    padding: 14px 16px;
    background: var(--bg);
    color: var(--fg-mute);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    white-space: pre-wrap;
    max-height: 380px;
    overflow-y: auto;
    font-size: 13px;
    line-height: 1.55;
    scrollbar-width: thin;
    scrollbar-color: var(--line-2) transparent;
  }
  .summary-box::-webkit-scrollbar { width: 8px; }
  .summary-box::-webkit-scrollbar-thumb { background: var(--line-2); border-radius: 999px; }

  /* raw-json disclosure */
  details.raw-json { margin-top: 10px; }
  details.raw-json summary {
    cursor: pointer; color: var(--fg-mute); font-size: 12px;
    padding: 4px 0; user-select: none;
    display: flex; align-items: center; gap: 6px;
  }
  details.raw-json summary::-webkit-details-marker { display: none; }
  details.raw-json summary::before {
    content: "›";
    color: var(--fg-dim);
    transition: transform var(--dur-fast) var(--ease);
    display: inline-block;
  }
  details.raw-json[open] summary::before { transform: rotate(90deg); }
  details.raw-json summary:hover { color: var(--fg); }
  details.raw-json table {
    font-size: 12.5px; margin-top: 8px;
    width: 100%;
  }
  details.raw-json td {
    padding: 4px 8px 4px 0; border: none; vertical-align: top;
  }
  details.raw-json td.k {
    color: var(--fg-dim); white-space: nowrap; padding-right: 12px;
  }
  details.raw-json td:not(.k) {
    color: var(--fg-mute); word-break: break-word;
  }

  /* brain nodes */
  .brain-node {
    padding: 12px 14px;
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 2px solid var(--accent);
    border-radius: var(--r-md);
    margin-bottom: 8px;
    transition: border-color var(--dur-fast) var(--ease);
  }
  .brain-node:hover { border-color: var(--line-2); border-left-color: var(--accent); }
  .brain-node .n {
    font-weight: 600;
    display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap;
  }
  .brain-node .l {
    color: var(--fg-dim); font-size: 11.5px;
    text-transform: uppercase; letter-spacing: 0.06em;
    font-weight: 500;
  }
  .brain-node .s {
    color: var(--fg-mute); margin-top: 6px;
    font-size: 13px;
  }

  /* misc */
  .muted { color: var(--fg-mute); }
  .dim   { color: var(--fg-dim); }
  .small { font-size: 12.5px; }
  .tooltip {
    cursor: help;
    border-bottom: 1px dotted var(--fg-dim);
  }

  /* hint text under status buttons */
  .hint-line {
    margin-top: 10px;
    color: var(--fg-dim);
    font-size: 12px;
    display: flex; align-items: center; gap: 6px;
  }
  .hint-line svg { width: 12px; height: 12px; flex: none; }

  /* ---- toast ---- */
  .toast {
    position: fixed; bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(8px);
    background: var(--panel-2);
    border: 1px solid var(--line-2);
    color: var(--fg);
    padding: 10px 14px 10px 36px;
    border-radius: var(--r-md);
    box-shadow: var(--shadow-md);
    z-index: 100;
    opacity: 0; pointer-events: none;
    transition: opacity var(--dur-base) var(--ease),
                transform var(--dur-base) var(--ease);
    font-size: 13px;
    max-width: 480px;
    position: fixed;
  }
  .toast::before {
    content: "";
    position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--yes);
    box-shadow: 0 0 8px var(--yes);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* responsive: keep sidebar but tighten on smaller laptops */
  @media (max-width: 1100px) {
    :root { --sidebar-w: 240px; }
    main { padding: 14px 18px 60px; }
  }
</style>
</head>
<body>
<header>
  <div class="brand">
    <span class="brand-dot" aria-hidden="true"></span>
    <span>scout</span>
    <span class="brand-slash">/</span>
    <span class="brand-sub">triage</span>
  </div>
  <span class="stats" id="stats"><span class="spinner"></span></span>
  <span class="spacer"></span>
  <span class="hint">click any company to inspect</span>
</header>

<div class="layout">
<aside class="sidebar">
  <div class="block">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 4h12M4 8h8M6 12h4"/></svg>
      Filter
    </h3>
    <div class="filter-row">
      <div class="search-wrap">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="4.5"/><path d="M10.5 10.5L14 14" stroke-linecap="round"/></svg>
        <input id="q" placeholder="search name, vertical, reason…">
      </div>
    </div>
    <div class="filter-row">
      <select id="verdict">
        <option value="">verdict: any</option>
        <option value="yes">yes</option>
        <option value="maybe">maybe</option>
        <option value="no">no</option>
        <option value="__none__">(unscored)</option>
      </select>
    </div>
    <div class="filter-row">
      <select id="state">
        <option value="">status: any</option>
        <option value="new">new</option>
        <option value="reviewed">reviewed</option>
        <option value="tracked">tracked</option>
        <option value="dismissed">dismissed</option>
      </select>
    </div>
  </div>

  <div class="block" id="block-pipeline">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 8h3l2-5 2 10 2-5h3"/></svg>
      Pipeline
    </h3>
    <div id="pipeline-stats"><div class="loading-row"><span class="spinner"></span><span>loading…</span></div></div>
  </div>

  <div class="block" id="block-verdicts">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg>
      By verdict
    </h3>
    <div id="verdict-stats"></div>
  </div>

  <div class="block" id="block-status">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2" stroke-linecap="round"/></svg>
      By status
    </h3>
    <div id="status-stats"></div>
  </div>

  <div class="block" id="block-fetch" style="display:none">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M8 2v6m0 0l-2.5-2.5M8 8l2.5-2.5M3 12h10"/></svg>
      Enrichment failures
    </h3>
    <div id="fetch-stats"></div>
  </div>

  <div class="block" id="block-taste">
    <h3>
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 13L8 3l5 10H3z"/></svg>
      Current taste
    </h3>
    <div id="taste-stats"><div class="loading-row"><span class="spinner"></span><span>loading…</span></div></div>
  </div>
</aside>

<main>
  <div class="table-wrap">
    <table id="t">
      <thead>
        <tr>
          <th data-k="verdict">verdict</th>
          <th data-k="state">status</th>
          <th data-k="name">name</th>
          <th data-k="reason">reason</th>
          <th data-k="vertical">vertical</th>
          <th data-k="location">location</th>
          <th data-k="headcount">hc</th>
          <th data-k="stage">stage</th>
          <th>site</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
    <div id="empty" class="empty" style="display:none">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.5-4.5"/>
      </svg>
      <div class="t">No companies match the current filters.</div>
      <div class="small dim">Clear a filter, or run <code>scout ingest &lt;csv&gt;</code>.</div>
    </div>
  </div>
</main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="pane" id="pane" aria-hidden="true">
  <div class="pane-head">
    <h2 id="pane-title">—</h2>
    <span id="pane-pills" class="pills-inline"></span>
    <button class="close-btn" id="pane-close" aria-label="close">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
        <path d="M3.5 3.5l9 9M12.5 3.5l-9 9"/>
      </svg>
    </button>
  </div>
  <div class="pane-body" id="pane-body"><div class="loading-row"><span class="spinner"></span><span>loading…</span></div></div>
</aside>

<div class="toast" id="toast"></div>

<script>
const state = { rows: [], sort: { k: "verdict", dir: 1 }, openId: null, stats: null };

const pillClass = v => "pill pill-" + (v || "none");
const escapeHTML = s => String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

async function loadList() {
  const r = await fetch("/api/companies");
  const data = await r.json();
  state.rows = data.rows || [];
  const counts = countBy(state.rows, "verdict")
    .map(([k,v]) => `<span class="dim">${k||"unscored"}</span> <strong>${v}</strong>`)
    .join("<span class=\"dim\"> · </span>");
  document.getElementById("stats").innerHTML =
    `<strong>${state.rows.length}</strong> <span class="dim">companies</span>` +
    (counts ? `<span class="dim"> · </span>${counts}` : "");
  renderList();
}

async function loadStats() {
  let s;
  try {
    const r = await fetch("/api/stats");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    s = await r.json();
  } catch (e) {
    document.getElementById("pipeline-stats").innerHTML =
      `<div class="muted small">stats failed: ${escapeHTML(e.message)}</div>`;
    return;
  }
  state.stats = s;
  renderStats();
}

function statLine(k, v) {
  const cls = (Number(v) === 0) ? "v zero" : "v";
  return `<div class="stat-row"><span class="k">${escapeHTML(k)}</span><span class="${cls}">${v}</span></div>`;
}

function pcard(label, n) {
  const cls = (Number(n) === 0) ? "pnum zero" : "pnum";
  return `<div class="pcard"><div class="${cls}">${n}</div><div class="plabel">${escapeHTML(label)}</div></div>`;
}

function renderStats() {
  const s = state.stats || {};
  const survivors = filtered().length;

  // Pipeline: 2-column card grid for the big numbers.
  document.getElementById("pipeline-stats").innerHTML =
    `<div class="pipeline-grid">
       ${pcard("total", s.total_companies ?? 0)}
       ${pcard("survivors", survivors)}
       ${pcard("enriched", s.enriched_ok ?? 0)}
       ${pcard("scored", s.scored ?? 0)}
     </div>`;

  // By verdict
  const v = s.by_verdict || {};
  document.getElementById("verdict-stats").innerHTML =
    ["yes","maybe","no"].map(k => statLine(k, v[k] || 0)).join("") +
    statLine("unscored", s.unscored ?? 0);

  // By status
  const st = s.by_status || {};
  document.getElementById("status-stats").innerHTML =
    ["new","reviewed","tracked","dismissed"].map(k => statLine(k, st[k] || 0)).join("");

  // Fetch failures: show only non-ok statuses.
  const fs = s.fetch_status || {};
  const failures = Object.keys(fs).filter(k => k !== "ok").sort();
  if (failures.length === 0) {
    document.getElementById("block-fetch").style.display = "none";
  } else {
    document.getElementById("block-fetch").style.display = "";
    document.getElementById("fetch-stats").innerHTML =
      failures.map(k => statLine(k, fs[k])).join("");
  }

  // Taste
  const tasteHTML = s.current_taste
    ? `<div class="small"><span class="dim">source</span> <code>${escapeHTML(s.taste_source || "")}</code></div>
       <div class="small" style="margin-top:6px"><span class="dim">version</span> <code>${escapeHTML(s.current_taste)}</code></div>
       ${s.stale_verdicts > 0 ? `<div class="stale">
         <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 5v4M8 11.5v.5" stroke-linecap="round"/><circle cx="8" cy="8" r="6.5"/></svg>
         ${s.stale_verdicts} verdicts stale
       </div>` : ""}`
    : `<div class="muted small">no taste loaded — start <code>scout serve --taste-md taste.md</code></div>`;
  document.getElementById("taste-stats").innerHTML = tasteHTML;
}

function countBy(rows, key) {
  const m = new Map();
  for (const r of rows) m.set(r[key] || "", (m.get(r[key]||"") || 0) + 1);
  return Array.from(m.entries()).sort((a,b) => b[1] - a[1]);
}

function compare(a, b, k) {
  const av = a[k] ?? ""; const bv = b[k] ?? "";
  if (k === "headcount") return (av|0) - (bv|0);
  if (k === "verdict") {
    const order = { yes: 0, maybe: 1, no: 2, "": 3 };
    return (order[av] ?? 3) - (order[bv] ?? 3);
  }
  if (k === "state") {
    const order = { tracked: 0, new: 1, reviewed: 2, dismissed: 3, "": 1 };
    return (order[av] ?? 1) - (order[bv] ?? 1);
  }
  return String(av).localeCompare(String(bv));
}

function sortWithDismissedLast(rows) {
  return rows.slice().sort((a, b) => {
    const av = state.sort.dir * compare(a, b, state.sort.k);
    const ad = (a.state === "dismissed") ? 1 : 0;
    const bd = (b.state === "dismissed") ? 1 : 0;
    if (ad !== bd) return ad - bd;
    return av;
  });
}

function filtered() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const v = document.getElementById("verdict").value;
  const s = document.getElementById("state").value;
  return state.rows.filter(r => {
    if (v === "__none__" && r.verdict) return false;
    if (v && v !== "__none__" && r.verdict !== v) return false;
    if (s && r.state !== s) return false;
    if (q) {
      const hay = (r.name + " " + (r.vertical||"") + " " + (r.reason||"")).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function renderList() {
  const tbody = document.querySelector("#t tbody");
  tbody.innerHTML = "";
  const rows = sortWithDismissedLast(filtered());
  document.getElementById("empty").style.display = rows.length ? "none" : "block";
  // Sidebar "survivors" card updates with the current filter.
  if (state.stats) {
    const cards = document.querySelectorAll("#pipeline-stats .pipeline-grid .pcard");
    if (cards[1]) {
      const num = cards[1].querySelector(".pnum");
      if (num) {
        num.textContent = rows.length;
        num.classList.toggle("zero", rows.length === 0);
      }
    }
  }
  for (const r of rows) {
    const tr = document.createElement("tr");
    tr.dataset.id = r.company_id;
    if (r.state === "tracked") tr.classList.add("row-tracked");
    if (r.state === "dismissed") tr.classList.add("row-dismissed");
    tr.innerHTML = `
      <td><span class="${pillClass(r.verdict)}">${escapeHTML(r.verdict || "—")}</span></td>
      <td><span class="pill pill-status pill-status-${escapeHTML(r.state || "new")}">${escapeHTML(r.state || "new")}</span></td>
      <td><span class="row-name" data-id="${r.company_id}">${escapeHTML(r.name)}</span></td>
      <td class="reason">${escapeHTML(r.reason || "")}</td>
      <td>${escapeHTML(r.vertical || "")}</td>
      <td>${escapeHTML(r.location || "")}</td>
      <td>${r.headcount || ""}</td>
      <td>${escapeHTML(r.stage || "")}</td>
      <td>${r.website_url ? `<a href="${escapeHTML(r.website_url)}" target="_blank" rel="noopener">about ↗</a>` : ""}</td>
    `;
    tbody.appendChild(tr);
  }
  tbody.querySelectorAll(".row-name").forEach(el => {
    el.addEventListener("click", () => openDetail(parseInt(el.dataset.id, 10)));
  });
}

function updateRowState(id, newState) {
  const row = state.rows.find(r => r.company_id === id);
  if (row) row.state = newState;
  renderList();
}

// ---- detail pane ----
async function openDetail(id) {
  state.openId = id;
  const pane = document.getElementById("pane");
  const scrim = document.getElementById("scrim");
  pane.classList.add("open"); scrim.classList.add("open");
  pane.setAttribute("aria-hidden", "false");
  document.getElementById("pane-title").textContent = "loading…";
  document.getElementById("pane-pills").innerHTML = "";
  document.getElementById("pane-body").innerHTML =
    '<div class="loading-row"><span class="spinner"></span><span>loading…</span></div>';

  let d;
  try {
    const r = await fetch(`/api/companies/${id}`);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    d = await r.json();
  } catch (e) {
    document.getElementById("pane-body").innerHTML =
      `<div class="muted">Failed to load detail: ${escapeHTML(e.message)}</div>`;
    return;
  }
  renderDetail(d);
  loadBrain(id);
}

function closeDetail() {
  state.openId = null;
  document.getElementById("pane").classList.remove("open");
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("pane").setAttribute("aria-hidden", "true");
}

function renderDetail(d) {
  document.getElementById("pane-title").textContent = d.name;
  document.getElementById("pane-pills").innerHTML = `
    <span class="${pillClass(d.has_verdict ? d.verdict : "")}">${escapeHTML(d.has_verdict ? d.verdict : "unscored")}</span>
    <span class="pill pill-status pill-status-${escapeHTML(d.state || "new")}">${escapeHTML(d.state || "new")}</span>
  `;

  const domainLine = d.domain
    ? `<a href="https://${escapeHTML(d.domain)}" target="_blank" rel="noopener">${escapeHTML(d.domain)} ↗</a>`
    : '<span class="muted">no domain</span>';

  const verdictBlock = d.has_verdict ? `
    <dl class="kv">
      <dt>verdict</dt><dd><span class="${pillClass(d.verdict)}">${escapeHTML(d.verdict)}</span></dd>
      <dt>reason</dt><dd>${escapeHTML(d.reason || "")}</dd>
      <dt>model</dt><dd class="small muted">${escapeHTML(d.model || "")}</dd>
      <dt>taste version</dt><dd class="small muted"><span class="tooltip" title="scored ${escapeHTML(d.scored_at)} · model ${escapeHTML(d.model)}">${escapeHTML(d.taste_version || "")}</span></dd>
      <dt>scored at</dt><dd class="small muted">${escapeHTML(d.scored_at || "")}</dd>
    </dl>
  ` : '<div class="muted">Not yet scored. Run <code>scout verdict</code>.</div>';

  const enrichBlock = d.has_enrichment ? `
    <dl class="kv">
      <dt>url</dt><dd>${d.website_url ? `<a href="${escapeHTML(d.website_url)}" target="_blank" rel="noopener">${escapeHTML(d.website_url)} ↗</a>` : '<span class="muted">—</span>'}</dd>
      <dt>status</dt><dd class="small">${escapeHTML(d.fetch_status || "")}${d.fetch_error ? ` <span class="muted">(${escapeHTML(d.fetch_error)})</span>` : ""}</dd>
      <dt>fetched</dt><dd class="small muted">${escapeHTML(d.fetched_at || "")}</dd>
    </dl>
    ${d.website_summary ? `<div class="summary-box">${escapeHTML(d.website_summary)}</div>` : ""}
  ` : '<div class="muted">No enrichment yet. Run <code>scout enrich</code>.</div>';

  const epBlock = d.episode_sent
    ? `<div class="small">Shipped to brain on <strong>${escapeHTML((d.episode_sent_at || "").slice(0,10))}</strong> for taste_version <code>${escapeHTML(d.taste_version)}</code>.</div>`
    : (d.has_verdict
        ? '<div class="muted">Not yet shipped to brain. Run <code>scout episodes</code>.</div>'
        : '<div class="muted">No verdict to ship.</div>');

  const rawRows = Object.keys(d.raw_json || {}).sort();
  const rawHTML = rawRows.length === 0 ? '' : `
    <details class="raw-json">
      <summary>Raw row <span class="dim">(${rawRows.length} fields)</span></summary>
      <table><tbody>
        ${rawRows.map(k => `<tr><td class="k">${escapeHTML(k)}</td><td>${escapeHTML(d.raw_json[k])}</td></tr>`).join("")}
      </tbody></table>
    </details>
  `;

  const trackedHint = d.state === "tracked"
    ? `Promote command ready — click <em>Mark tracked</em> again to re-copy.`
    : `<em>Mark tracked</em> also copies <code>tracker.py add</code> to the clipboard.`;

  document.getElementById("pane-body").innerHTML = `
    <section class="pane-section">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M2 8h12M8 2v12"/></svg>
        Status
      </h3>
      <div class="status-btns" id="status-btns">
        <button class="status-btn${d.state === "reviewed" ? " active" : ""}" data-state="reviewed">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg>
          Reviewed
        </button>
        <button class="status-btn${d.state === "tracked" ? " active" : ""}" data-state="tracked">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 4l5 8 5-8M3 4h10"/></svg>
          Tracked
        </button>
        <button class="status-btn${d.state === "dismissed" ? " active" : ""}" data-state="dismissed">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"><path d="M4 4l8 8M12 4l-8 8"/></svg>
          Dismissed
        </button>
      </div>
      <div class="hint-line">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5M8 11v.5" stroke-linecap="round"/></svg>
        <span>${trackedHint}</span>
      </div>
    </section>

    <section class="pane-section">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2.5" y="3" width="11" height="10" rx="1"/><path d="M5 6h6M5 9h4"/></svg>
        Crunchbase facts
      </h3>
      <dl class="kv">
        <dt>vertical</dt><dd>${escapeHTML(d.vertical || "—")}</dd>
        <dt>location</dt><dd>${escapeHTML(d.location || "—")}</dd>
        <dt>headcount</dt><dd>${d.headcount || "—"}</dd>
        <dt>stage</dt><dd>${escapeHTML(d.funding_stage || "—")}</dd>
        <dt>domain</dt><dd>${domainLine}</dd>
        <dt>source</dt><dd class="small muted">${escapeHTML(d.source)} · ${escapeHTML(d.source_id)}</dd>
        <dt>ingested</dt><dd class="small muted">${escapeHTML(d.ingested_at)}</dd>
      </dl>
      ${rawHTML}
    </section>

    <section class="pane-section">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 8l3 3 7-7"/></svg>
        Verdict
      </h3>
      ${verdictBlock}
    </section>

    <section class="pane-section">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="8" cy="8" r="6"/><path d="M2 8h12M8 2c2 2 3 4 3 6s-1 4-3 6c-2-2-3-4-3-6s1-4 3-6z"/></svg>
        Enrichment
      </h3>
      ${enrichBlock}
    </section>

    <section class="pane-section" id="brain-section" style="display:none">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3c-1.5 0-2.5 1-2.5 2.5 0 .5.2 1 .5 1.5-1 .5-1.5 1.5-1.5 2.5 0 1.5 1.5 2.5 3.5 2.5s3.5-1 3.5-2.5c0-1-.5-2-1.5-2.5.3-.5.5-1 .5-1.5C10.5 4 9.5 3 8 3z"/></svg>
        Brain context
      </h3>
      <div id="brain-body"><div class="loading-row"><span class="spinner"></span><span>asking the brain…</span></div></div>
    </section>

    <section class="pane-section">
      <h3>
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M2 5l6 6 6-6"/></svg>
        Episode history
      </h3>
      ${epBlock}
    </section>
  `;

  document.querySelectorAll("#status-btns .status-btn").forEach(btn => {
    btn.addEventListener("click", () => onStatusClick(d, btn.dataset.state));
  });
}

async function onStatusClick(d, newState) {
  const btns = document.querySelectorAll("#status-btns .status-btn");
  btns.forEach(b => b.disabled = true);
  let resp;
  try {
    resp = await fetch(`/api/companies/${d.company_id}/status`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ state: newState }),
    });
  } catch (e) {
    toast(`status update failed: ${e.message}`);
    btns.forEach(b => b.disabled = false);
    return;
  }
  if (!resp.ok) {
    const txt = await resp.text().catch(() => "");
    toast(`status update failed: HTTP ${resp.status}${txt ? " — " + txt : ""}`);
    btns.forEach(b => b.disabled = false);
    return;
  }

  d.state = newState;
  updateRowState(d.company_id, newState);

  btns.forEach(b => {
    b.classList.toggle("active", b.dataset.state === newState);
    b.disabled = false;
  });

  const pills = document.getElementById("pane-pills");
  pills.innerHTML = `
    <span class="${pillClass(d.has_verdict ? d.verdict : "")}">${escapeHTML(d.has_verdict ? d.verdict : "unscored")}</span>
    <span class="pill pill-status pill-status-${escapeHTML(d.state)}">${escapeHTML(d.state)}</span>
  `;

  if (newState === "tracked") {
    const cmd = `tracker.py add "${d.name}"`;
    try {
      await navigator.clipboard.writeText(cmd);
      toast(`copied: ${cmd}`);
    } catch {
      toast(`tracked — copy manually: ${cmd}`);
    }
  } else {
    toast(`marked ${newState}`);
  }
}

async function loadBrain(id) {
  let r;
  try {
    r = await fetch(`/api/companies/${id}/brain`);
  } catch {
    return;
  }
  if (r.status === 404) return;
  if (!r.ok) {
    showBrain(`<div class="muted">Brain lookup failed: HTTP ${r.status}.</div>`);
    return;
  }
  const data = await r.json();
  if (data.error) {
    showBrain(`<div class="muted">Brain lookup error: ${escapeHTML(data.error)}.</div>`);
    return;
  }
  const nodes = data.nodes || [];
  if (nodes.length === 0) {
    showBrain('<div class="muted">Nothing in the brain about this company.</div>');
    return;
  }
  showBrain(nodes.map(n => `
    <div class="brain-node">
      <div class="n">
        <span>${escapeHTML(n.name)}</span>
        ${n.labels && n.labels.length ? `<span class="l">${escapeHTML(n.labels.join(" · "))}</span>` : ""}
      </div>
      ${n.summary ? `<div class="s">${escapeHTML(n.summary)}</div>` : ""}
    </div>
  `).join(""));
}

function showBrain(html) {
  const sec = document.getElementById("brain-section");
  if (!sec) return;
  sec.style.display = "";
  document.getElementById("brain-body").innerHTML = html;
}

let toastTimer;
function toast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

// ---- wiring ----
document.querySelectorAll("#t thead th[data-k]").forEach(th => {
  th.onclick = () => {
    const k = th.dataset.k;
    if (state.sort.k === k) state.sort.dir *= -1; else { state.sort.k = k; state.sort.dir = 1; }
    renderList();
  };
});
document.getElementById("q").oninput = renderList;
document.getElementById("verdict").onchange = renderList;
document.getElementById("state").onchange = renderList;
document.getElementById("pane-close").onclick = closeDetail;
document.getElementById("scrim").onclick = closeDetail;
document.addEventListener("keydown", e => { if (e.key === "Escape") closeDetail(); });

loadList();
loadStats();

// When a status changes via the detail pane, refresh stats so by_status updates.
const origUpdateRowState = updateRowState;
updateRowState = function(id, newState) {
  origUpdateRowState(id, newState);
  loadStats();
};
</script>
</body>
</html>
