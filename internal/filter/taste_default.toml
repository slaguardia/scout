# scout pre-filter — structured rules for the cheap mechanical gate that runs
# before the (paid) LLM verdict. Edited from the dashboard (Criteria →
# "pre-filter"); this file is only the compiled-in default used until you save
# your own. Narrative taste context for the LLM lives in taste.md; the real
# judgment lives in the brain-derived company-fit brief.
#
# Be conservative here — this gate is brain-free and judgment-free. Location,
# headcount, and has-domain are unambiguous facts worth gating on cheaply.
# Vertical include/exclude is a taste call the brain-informed LLM is better at;
# substring matching here is blunt (e.g. "law" matches "Law Enforcement").

[location]
# Lowercased substrings. A company's `location` field matches if it contains any.
allowed = ["san francisco", "sf", "bay area", "remote"]
remote_ok = true   # if true, missing or "remote" location passes

[headcount]
# Both bounds inclusive. 0 means "no bound." NULL headcount passes (we don't
# punish companies for not exporting the field).
min = 0
max = 500

[verticals]
# If `allowed` is non-empty, the vertical must match one of these.
# `excluded` always filters out matches even if `allowed` is empty.
# Match is case-insensitive substring.
allowed  = []
excluded = ["law", "legal tech", "voice", "voice ai", "crypto", "blockchain", "web3", "insurance", "insurtech"]

[funding_stage]
# Empty = allow all.
allowed = []
