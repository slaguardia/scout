# mprocs — one window for every scout dev server.
#
# Run `mprocs` from the repo root. You get a TUI listing both processes with
# live logs; select one and press:
#   r  restart      x  stop/start      ↑/↓  switch      q  quit (kills all)
#
# This is the canonical place scout's dev servers live. If you ever see a
# stray `scout serve` or `vite` running outside this window, it's an orphan
# you can kill — nothing here started it.
#
# Install: brew install mprocs
procs:
  api:
    # Python control surface (FastAPI on uvicorn) + local SQLite, serves /api on :8765.
    # Needs ANTHROPIC_API_KEY (shell env or a .env in the repo root) for
    # verdict/capture/outreach; runs read-only without it.
    # The email template and stage prompts live in the DB (singleton rows,
    # edited from the dashboard) — no file flags.
    shell: ".venv/bin/scout serve --addr :8765 --db scout.db --brainbot http://127.0.0.1:8100"

  web:
    # Vite dev server on :5173, proxies /api/* to the Python server on :8765.
    # This is the URL you open in the browser.
    shell: "npm run dev"
    cwd: web
